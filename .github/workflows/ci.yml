name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  uji:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pasang Tenun
        run: curl -fsSL https://raw.githubusercontent.com/TenunLang/Tenun/main/install.sh | bash
      - name: Pasang dependensi uji
        run: |
          mkdir -p tenun_modul
          git clone --depth 1 https://github.com/TenunLang/modul-web tenun_modul/web
          git clone --depth 1 https://github.com/TenunLang/modul-tampilan tenun_modul/tampilan
          git clone --depth 1 https://github.com/TenunLang/modul-auth tenun_modul/auth
      - name: Uji unit
        run: |
          "$HOME/.tenun/bin/tenun" check .
